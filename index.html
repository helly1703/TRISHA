<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>For Trishuuu 💗</title>

    <link rel="stylesheet"
        href="style.css">

</head>


<body class="intro-page">


    <!-- Floating Background Shapes -->

    <div class="floating-shapes">

        <span class="shape shape-1"></span>

        <span class="shape shape-2"></span>

        <span class="shape shape-3"></span>

        <span class="shape shape-4"></span>

        <span class="shape shape-5"></span>

    </div>


    <!-- Floating Balloons -->

    <div class="balloon balloon-one">

        🎈

    </div>


    <div class="balloon balloon-two">

        🎈

    </div>


    <div class="balloon balloon-three">

        🎈

    </div>


    <div class="balloon balloon-four">

        🎈

    </div>


    <!-- Main Content -->

    <main class="intro-content">


        <p class="little-text">

            ✨ a little surprise is waiting for you ✨

        </p>


        <h1 class="floating-title">

            HAPPY

            <span>BIRTHDAY</span>

        </h1>


        <div class="name-wrapper">


            <span class="name-letter">T</span>

            <span class="name-letter">R</span>

            <span class="name-letter">I</span>

            <span class="name-letter">S</span>

            <span class="name-letter">H</span>

            <span class="name-letter">U</span>

            <span class="name-letter">U</span>

            <span class="name-letter">U</span>

            <span class="heart">💗</span>


        </div>


        <!-- Photo -->

        <div class="photo-wrapper">


            <div class="photo-glow"></div>


            <img src="helly.jpeg"
                alt="Trishuuu">


        </div>


        <p class="intro-message">

            Today is not just another day...

            <br>

            something magical is about to begin 🌈✨

        </p>


        <!-- Button -->

        <button class="start-button"
            onclick="startBirthday()">


            <span>OPEN YOUR SURPRISE</span>

            <b>✨</b>


        </button>


    </main>


    <!-- Bottom Text -->

    <p class="bottom-text">

        made with lots of love ♡

    </p>


    <script src="script.js"></script>


</body>

</html>
