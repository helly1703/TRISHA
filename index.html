<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Trishuuu 🎂</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;

            font-family: 'Segoe UI', sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #1a0033,
                    #4b006e,
                    #ff4f81
                );

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
        }

        /* Main Content */

        .container {
            text-align: center;

            z-index: 5;

            padding: 20px;

            animation:
                zoomIn 2s ease;
        }

        /* Crown */

        .crown {
            font-size: 55px;

            animation:
                float 2s infinite ease-in-out;
        }

        /* Main Heading */

        h1 {
            font-size: clamp(38px, 7vw, 85px);

            text-transform: uppercase;

            letter-spacing: 5px;

            color: white;

            text-shadow:
                0 0 10px #ffb3d9,
                0 0 25px #ff4f81,
                0 0 50px #ff1493;

            animation:
                glow 2s infinite alternate;
        }

        /* Sister Name */

        h2 {
            margin-top: 10px;

            font-size: clamp(25px, 5vw, 50px);

            color: #ffd700;

            text-shadow:
                0 0 15px #ff9800;

            animation:
                bounce 1.5s infinite;
        }

        /* Sister Photo */

        .sister-photo {

            width: 250px;

            height: 300px;

            object-fit: cover;

            border-radius: 25px;

            border: 6px solid #ffd700;

            margin-top: 15px;

            box-shadow:

                0 0 15px #ffd700,
                0 0 30px #ff69b4,
                0 0 50px #ff1493;

            animation:

                photoGlow 2s infinite alternate,

                photoFloat 3s infinite ease-in-out;
        }

        /* Birthday Message */

        .message {

            margin-top: 15px;

            font-size: 19px;

            color: #ffe6f2;

            animation:
                fadeIn 3s ease;
        }

        /* Cake */

        .cake {

            font-size: 65px;

            margin-top: 10px;

            animation:
                cakeBounce 1.5s infinite;
        }

        /* Button */

        button {

            margin-top: 10px;

            padding: 13px 30px;

            border: none;

            border-radius: 30px;

            font-size: 17px;

            font-weight: bold;

            color: white;

            background:

                linear-gradient(
                    45deg,
                    #ff1493,
                    #ff69b4
                );

            box-shadow:

                0 0 20px #ff69b4;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: scale(1.15);

            box-shadow:
                0 0 40px white;
        }

        /* Balloons */

        .balloon {

            position: absolute;

            bottom: -150px;

            font-size: 70px;

            animation:

                balloonUp
                10s
                linear
                infinite;
        }

        .b1 {
            left: 5%;
            animation-delay: 0s;
        }

        .b2 {
            left: 25%;
            animation-delay: 2s;
        }

        .b3 {
            left: 50%;
            animation-delay: 4s;
        }

        .b4 {
            left: 75%;
            animation-delay: 1s;
        }

        .b5 {
            left: 90%;
            animation-delay: 3s;
        }

        /* Stars */

        .star {

            position: absolute;

            color: white;

            font-size: 25px;

            animation:

                twinkle
                2s
                infinite
                alternate;
        }

        .s1 {
            top: 10%;
            left: 10%;
        }

        .s2 {
            top: 20%;
            right: 15%;
        }

        .s3 {
            bottom: 20%;
            left: 15%;
        }

        .s4 {
            bottom: 10%;
            right: 10%;
        }

        /* Confetti */

        .confetti {

            position: absolute;

            width: 10px;

            height: 20px;

            top: -30px;

            animation:

                fall
                5s
                linear
                infinite;
        }

        /* Zoom Animation */

        @keyframes zoomIn {

            from {

                transform: scale(0);

                opacity: 0;
            }

            to {

                transform: scale(1);

                opacity: 1;
            }
        }

        /* Heading Glow */

        @keyframes glow {

            from {

                text-shadow:

                    0 0 10px #ffb3d9,

                    0 0 25px #ff4f81;
            }

            to {

                text-shadow:

                    0 0 20px white,

                    0 0 40px #ff1493,

                    0 0 70px #ff69b4;
            }
        }

        /* Bounce */

        @keyframes bounce {

            0%,
            100% {

                transform:
                    translateY(0);
            }

            50% {

                transform:
                    translateY(-15px);
            }
        }

        /* Cake Animation */

        @keyframes cakeBounce {

            0%,
            100% {

                transform:
                    translateY(0)
                    rotate(0deg);
            }

            50% {

                transform:
                    translateY(-15px)
                    rotate(5deg);
            }
        }

        /* Crown Animation */

        @keyframes float {

            0%,
            100% {

                transform:
                    translateY(0)
                    rotate(-5deg);
            }

            50% {

                transform:
                    translateY(-20px)
                    rotate(5deg);
            }
        }

        /* Photo Glow */

        @keyframes photoGlow {

            from {

                box-shadow:

                    0 0 15px #ffd700,

                    0 0 30px #ff69b4;
            }

            to {

                box-shadow:

                    0 0 25px white,

                    0 0 50px #ff1493,

                    0 0 80px #ffd700;
            }
        }

        /* Photo Float */

        @keyframes photoFloat {

            0%,
            100% {

                transform:
                    translateY(0);
            }

            50% {

                transform:
                    translateY(-10px);
            }
        }

        /* Balloon Animation */

        @keyframes balloonUp {

            0% {

                transform:
                    translateY(0)
                    rotate(0deg);

                opacity: 0;
            }

            10% {

                opacity: 1;
            }

            100% {

                transform:
                    translateY(-120vh)
                    rotate(360deg);

                opacity: 0;
            }
        }

        /* Star Animation */

        @keyframes twinkle {

            from {

                opacity: 0.3;

                transform:
                    scale(0.8);
            }

            to {

                opacity: 1;

                transform:
                    scale(1.3);
            }
        }

        /* Confetti Animation */

        @keyframes fall {

            0% {

                transform:
                    translateY(0)
                    rotate(0deg);
            }

            100% {

                transform:
                    translateY(110vh)
                    rotate(720deg);
            }
        }

        /* Message Animation */

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform:
                    translateY(30px);
            }

            to {

                opacity: 1;

                transform:
                    translateY(0);
            }
        }

    </style>

</head>


<body>


    <!-- Main Content -->

    <div class="container">


        <!-- Crown -->

        <div class="crown">

            👑

        </div>


        <!-- Birthday Heading -->

        <h1>

            Happiest Birthday

        </h1>


        <!-- Sister Name -->

        <h2>

            TRISHUUUUU 💖

        </h2>


        <!-- Sister Photo -->

        <img

            src="images/helly.jpeg"

            alt="My Sister"

            class="sister-photo">


        <!-- Birthday Message -->

        <p class="message">

            Wishing you lots of happiness,
            love & success! ✨💝

        </p>


        <!-- Cake -->

        <div class="cake">

            🎂

        </div>


        <!-- Surprise Button -->

        <button onclick="celebrate()">

            🎉 Click for Surprise 🎉

        </button>


    </div>


    <!-- Balloons -->

    <div class="balloon b1">

        🎈

    </div>

    <div class="balloon b2">

        🎈

    </div>

    <div class="balloon b3">

        🎈

    </div>

    <div class="balloon b4">

        🎈

    </div>

    <div class="balloon b5">

        🎈

    </div>


    <!-- Stars -->

    <div class="star s1">

        ✨

    </div>

    <div class="star s2">

        ⭐

    </div>

    <div class="star s3">

        ✨

    </div>

    <div class="star s4">

        🌟

    </div>


    <!-- JavaScript -->

    <script>

        function celebrate() {


            alert(

                "🎉🎂 Happy Birthday TRISHUUU! 💖🥳"

            );


            for (

                let i = 0;

                i < 80;

                i++

            ) {


                let confetti =

                    document.createElement(

                        "div"

                    );


                confetti.className =

                    "confetti";


                confetti.style.left =

                    Math.random() *

                    100 +

                    "vw";


                confetti.style.background =

                    "hsl("

                    +

                    Math.random() * 360

                    +

                    ", 100%, 60%)";


                confetti.style.animationDuration =

                    (

                        Math.random() * 3

                        + 2

                    )

                    + "s";


                document.body.appendChild(

                    confetti

                );


                setTimeout(

                    () => {

                        confetti.remove();

                    },

                    5000

                );

            }

        }

    </script>


</body>

</html>
